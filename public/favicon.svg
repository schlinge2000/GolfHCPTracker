<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1D9E75"/>

  <!-- Head -->
  <circle cx="32" cy="13" r="5" fill="#fff"/>

  <!-- Cap brim -->
  <ellipse cx="32" cy="10" rx="7" ry="2.5" fill="#fff"/>
  <rect x="25" y="8" width="14" height="4" rx="2" fill="#fff"/>

  <!-- Body / torso (leaning into swing) -->
  <line x1="32" y1="18" x2="27" y2="34" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left arm (extended follow-through, up-right) -->
  <line x1="30" y1="24" x2="44" y2="18" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- Right arm (down toward ball) -->
  <line x1="30" y1="24" x2="22" y2="32" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- Club shaft -->
  <line x1="22" y1="32" x2="17" y2="46" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- Club head -->
  <rect x="13" y="44" width="8" height="4" rx="1.5" fill="#fff" transform="rotate(-15 17 46)"/>

  <!-- Legs -->
  <line x1="27" y1="34" x2="24" y2="48" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="27" y1="34" x2="31" y2="48" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Ground line -->
  <line x1="14" y1="50" x2="50" y2="50" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Ball -->
  <circle cx="17" cy="50" r="2.5" fill="#fff"/>

  <!-- Flag on right -->
  <line x1="48" y1="50" x2="48" y2="30" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <polygon points="48,30 58,35 48,40" fill="#fff" opacity="0.85"/>
</svg>
